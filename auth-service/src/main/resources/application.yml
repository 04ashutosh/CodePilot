server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: auth-service

  # ===== PostgreSQL =====
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/codepilot_auth}
    username: ${SPRING_DATASOURCE_USERNAME:codepilot}
    password: ${SPRING_DATASOURCE_PASSWORD:codepilot_secret_2026}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # ===== JPA =====
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    open-in-view: false

  # ===== Flyway =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ===== JWT =====
app:
  jwt:
    secret: ${JWT_SECRET:Y29kZXBpbG90LWFpLXN1cGVyLXNlY3JldC1rZXktMjAyNi1wcm9kdWN0aW9uLWdyYWRl}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

# ===== Actuator =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ===== Logging =====
logging:
  level:
    com.codepilot.auth: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ===== OpenAPI =====
springdoc:
  api-docs:
    path: /api/auth/v3/api-docs
  swagger-ui:
    path: /api/auth/swagger-ui.html